<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Mon équipe préférée - CDM 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Roboto', Arial, sans-serif;
      background-color: #0b3d2e;
      color: white;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .header a {
      display: inline-block;
      color: #aaa;
      text-decoration: none;
      font-size: 14px;
      margin-bottom: 16px;
    }

    .header a:hover { color: white; }

    .header h1 {
      color: gold;
      font-size: 42px;
      font-weight: 700;
    }

    .header p {
      color: #ccc;
      margin-top: 8px;
      font-size: 16px;
    }

    .recherche-wrapper {
      max-width: 400px;
      margin: 0 auto 32px;
      position: relative;
    }

    .recherche-wrapper input {
      width: 100%;
      padding: 12px 16px 12px 42px;
      border-radius: 10px;
      border: none;
      background: rgba(255,255,255,0.1);
      color: white;
      font-size: 15px;
      outline: none;
    }

    .recherche-wrapper input::placeholder { color: #aaa; }

    .recherche-wrapper input:focus {
      background: rgba(255,255,255,0.15);
      outline: 2px solid gold;
    }

    .recherche-wrapper .icone {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 18px;
    }

    .grille {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 14px;
      max-width: 900px;
      margin: 0 auto;
    }

    .carte {
      background: rgba(255,255,255,0.08);
      border: 1.5px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 16px 10px;
      text-align: center;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .carte:hover {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.3);
      transform: translateY(-2px);
    }

    .carte.selectionnee {
      background: rgba(29, 158, 117, 0.25);
      border: 2px solid #1D9E75;
    }

    .carte img {
      width: 52px;
      height: 35px;
      object-fit: cover;
      border-radius: 4px;
      margin-bottom: 8px;
    }

    .carte .nom {
      font-size: 12px;
      font-weight: 500;
      color: white;
      line-height: 1.3;
    }

    .carte .titres {
      font-size: 11px;
      color: #aaa;
      margin-top: 3px;
    }

    .carte.selectionnee .nom { color: #5DCAA5; }
    .carte.selectionnee .titres { color: #9FE1CB; }

    .barre-confirmation {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #0b3d2e;
      border-top: 1px solid rgba(255,255,255,0.15);
      padding: 16px 24px;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      z-index: 10;
    }

    .barre-confirmation .infos {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .barre-confirmation img {
      width: 44px;
      height: 30px;
      object-fit: cover;
      border-radius: 4px;
    }

    .barre-confirmation .nom-equipe {
      font-size: 16px;
      font-weight: 500;
    }

    .barre-confirmation .sous-titre {
      font-size: 13px;
      color: #aaa;
    }

    .btn-confirmer {
      background: #1D9E75;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 12px 28px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
    }

    .btn-confirmer:hover { background: #0F6E56; }

    .message-confirmation {
      text-align: center;
      margin: 40px auto;
      max-width: 400px;
      display: none;
    }

    .message-confirmation .emoji { font-size: 64px; }

    .message-confirmation h2 {
      color: gold;
      font-size: 26px;
      margin: 16px 0 8px;
    }

    .message-confirmation p { color: #ccc; }

    .message-confirmation a {
      display: inline-block;
      margin-top: 20px;
      color: gold;
      text-decoration: none;
      font-size: 15px;
    }

    #aucun-resultat {
      display: none;
      text-align: center;
      color: #aaa;
      grid-column: 1 / -1;
      padding: 40px;
    }
  </style>
</head>
<body>

  <div class="header">
   <button onclick="window.location.href='/'">↩️ revenir</button>
    <h1>⭐ Ton équipe préférée</h1>
    <p>Choisis l'équipe que tu supportes pour la Coupe du Monde 2026</p>
  </div>

  <div class="recherche-wrapper">
    <span class="icone">🔍</span>
    <input type="text" id="recherche" placeholder="Rechercher une équipe..." oninput="filtrer()">
  </div>

  <div class="grille" id="grille">
    <p style="color:#aaa; grid-column:1/-1; text-align:center; padding:40px;">Chargement des équipes...</p>
  </div>

  <div id="aucun-resultat">Aucune équipe trouvée.</div>

  <div class="barre-confirmation" id="barre">
    <div class="infos">
      <img id="drapeau-selectionne" src="" alt="">
      <div>
        <div class="nom-equipe" id="nom-selectionne"></div>
        <div class="sous-titre" id="titres-selectionnes"></div>
      </div>
    </div>
    <button class="btn-confirmer" onclick="confirmer()">Confirmer mon choix ✓</button>
  </div>

  <div class="message-confirmation" id="message-final">
    <div class="emoji">🏆</div>
    <h2 id="texte-final"></h2>
    <p>Ton équipe préférée a bien été enregistrée !</p>
    <a href="/">← Retour à l'accueil</a>
  </div>

  <script>
    //const baseurl = "http://localhost:5000"   
    const baseurl = "https://tournoi-cdm-2026-1.onrender.com";
    let toutesLesEquipes = [];
    let equipeChoisie = null;

    fetch(`${baseurl}/equipes`)
      .then(r => r.json())
      .then(data => {
        toutesLesEquipes = data;
        afficher(data);
      })
      .catch(() => {
        document.getElementById("grille").innerHTML = "<p style='color:#aaa;grid-column:1/-1;text-align:center;padding:40px;'>Impossible de charger les équipes.</p>";
      });

    function afficher(equipes) {
      const grille = document.getElementById("grille");
      if (equipes.length === 0) {
        grille.innerHTML = "";
        document.getElementById("aucun-resultat").style.display = "block";
        return;
      }
      document.getElementById("aucun-resultat").style.display = "none";
      grille.innerHTML = equipes.map(e => `
        <div class="carte ${equipeChoisie && equipeChoisie.nom === e.nom ? 'selectionnee' : ''}"
             onclick="selectionner('${e.nom.replace(/'/g,"\\'")}', '${e.drapeau}', ${e.titres})">
          <img src="https://flagcdn.com/w80/${e.drapeau}.png" alt="${e.nom}" onerror="this.src='https://flagcdn.com/w80/un.png'">
          <div class="nom">${e.nom}</div>
          <div class="titres">${e.titres > 0 ? e.titres + ' titre' + (e.titres > 1 ? 's' : '') : 'Aucun titre'}</div>
        </div>
      `).join("");
    }

    function filtrer() {
      const val = document.getElementById("recherche").value.toLowerCase();
      afficher(toutesLesEquipes.filter(e => e.nom.toLowerCase().includes(val)));
    }

    function selectionner(nom, drapeau, titres) {
      equipeChoisie = { nom, drapeau, titres };
      afficher(toutesLesEquipes.filter(e => {
        const val = document.getElementById("recherche").value.toLowerCase();
        return e.nom.toLowerCase().includes(val);
      }));
      document.getElementById("drapeau-selectionne").src = `https://flagcdn.com/w80/${drapeau}.png`;
      document.getElementById("nom-selectionne").textContent = nom;
      document.getElementById("titres-selectionnes").textContent = titres > 0 ? `${titres} titre${titres > 1 ? 's' : ''} mondial${titres > 1 ? 'aux' : ''}` : "Aucun titre mondial";
      document.getElementById("barre").style.display = "flex";
    }

    function confirmer() {
        if (!equipeChoisie) return;
        fetch(`${baseurl}/sauvegarder`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ equipe: equipeChoisie.nom })
        })
        .then(r => r.json())
        .then(() => {
            document.getElementById("grille").style.display = "none";
            document.getElementById("barre").style.display = "none";
            document.getElementById("recherche").parentElement.style.display = "none";
            const msg = document.getElementById("message-final");
            document.getElementById("texte-final").textContent = `Allez ${equipeChoisie.nom} ! 🎉`;
            msg.style.display = "block";
        });
    }
  </script>

</body>
</html>
