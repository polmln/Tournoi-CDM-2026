<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Coupe du Monde 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #0b3d2e;
      color: white;
      text-align: center;
      margin: 0;
      padding: 20px;
    }

    h1 {
      color: gold;
      font-size: 70px;
    }
    
    h3 {
      font-family: "arial";
      color: rgb(0, 0, 0);
    }
    .ballon {
      font-size: 80px;
    }

    .equipes {
      display: flex;
      justify-content: center;
      gap: 30px;
      flex-wrap: wrap;
      margin-top: 30px;
    }

    .carte {
      background-color: white;
      color: black;
      font-size: 15px;
      border-radius: 30px;
      padding: 10px;
      width: 100px;
    }

    .carte img {
      width: 60px;
    }

    .carte h3 {
      margin: 10px 0 5px;
    }

    button {
      margin-top: 30px;
      padding: 10px 20px;
      font-size: 18px;
      background-color: gold;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background-color: orange;
    }

    #resultat {
      margin-top: 30px;
    }

    #resultat img {
      width: 80px;
      display: block;
      margin: 10px auto 0;
    }
  </style>
</head>
<body>

  <h1>Coupe du Monde 2026</h1>
  <div class="ballon">⚽</div>
  <p>Bienvenue sur la page officielle (pas vraiment) de la Coupe du Monde !</p>

  <div class="equipes" id="equipes">
    <p>Chargement des équipes...</p>
  </div>

  <button onclick="lancerTournoi()">Lancer le tournoi</button>
  <button onclick="afficherHistorique()">Voir l'historique</button>
  <button onclick="effacerHistorique()" title="Effacer l'historique">🗑️</button>
  <button onclick="effacerHistoriqueGagnantsFrance()">Effacer l'historique sauf pour la France</button>
  <button onclick="window.location.href='/equipe-preferee'">⭐ Choisir mon équipe préférée</button>

  <div id="resultat"></div>
  <div id="historique"></div>

  <script>
    const baseurl = "http://localhost:5000"   
    //const baseurl = "https://tournoi-cdm-2026-1.onrender.com" 
    function afficherEquipes() {
      const conteneur = document.getElementById("equipes");

      fetch(`${baseurl}/equipes`)
        .then(reponse => reponse.json())
        .then(donnees => {
          conteneur.innerHTML = donnees.map(equipe => `
            <div class="carte">
              <img src="https://flagcdn.com/w80/${equipe.drapeau}.png" alt="${equipe.nom}">
              <h3>${equipe.nom}</h3>
              <p>Coupes gagnees : ${equipe.titres}</p>
            </div>
          `).join("");
        })
        .catch(erreur => {
          conteneur.innerHTML = "<p>Impossible de contacter le serveur Python. Le serveur (app.py) est-il lance ?</p>";
        });
    }

    afficherEquipes();

    function lancerTournoi() {
      const resultat = document.getElementById("resultat");
      resultat.innerHTML = "<p>Simulation en cours...</p>";

      fetch(`${baseurl}/tournoi`)
        .then(reponse => reponse.json())
        .then(donnees => {
          resultat.innerHTML = `
            <h2>Vainqueur : ${donnees.gagnant} !</h2>
            <img src="https://flagcdn.com/w80/${donnees.drapeau}.png" alt="${donnees.gagnant}">
          `;
        })
        .catch(erreur => {
          resultat.innerHTML = "<p>Impossible de contacter le serveur Python. Le serveur (app.py) est-il lance ?</p>";
        });
    }

    function afficherHistorique() {
      const historique = document.getElementById("historique");
      historique.innerHTML = "<p>Chargement...</p>";

      fetch(`${baseurl}/historique`)
        .then(reponse => reponse.json())
        .then(donnees => {
          if (donnees.length === 0) {
            historique.innerHTML = "<p>Aucun tournoi joue pour le moment.</p>";
            return;
          }

          const lignes = donnees.map(ligne => `<li>${ligne.date} - ${ligne.gagnant}</li>`).join("");
          historique.innerHTML = `<h3>Historique des tournois</h3><ul>${lignes}</ul>`;
        })
        .catch(erreur => {
          historique.innerHTML = "<p>Impossible de contacter le serveur Python.</p>";
        });
    }

    function effacerHistorique() {
      fetch(`${baseurl}/historique/effacer`, { method: "POST" })
        .then(reponse => reponse.json())
        .then(donnees => {
          alert(donnees.message);
          afficherHistorique();
        })
        .catch(erreur => {
          alert("Impossible de contacter le serveur Python.");
        });
    }

    function effacerHistoriqueGagnantsFrance() {
      fetch(`${baseurl}/historique/effacer_sauf_france`, { method: "POST" })
        .then(reponse => reponse.json())
        .then(donnees => {
          alert(donnees.message);
          afficherHistorique();
        })
        .catch(erreur => {
          alert("Impossible de contacter le serveur Python.");
        });
    }
  </script>

</body>
</html>
